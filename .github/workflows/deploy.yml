name: Build and Deploy on Tag

on:
  push:
    tags:
      - 'v*'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get Git Info
        id: git-info
        run: |
          echo "commit_hash=$(git rev-parse HEAD)" >> $GITHUB_OUTPUT
          echo "commit_short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT
          if git describe --tags --exact-match >/dev/null 2>&1; then
            echo "git_tag=$(git describe --tags --exact-match)" >> $GITHUB_OUTPUT
            echo "is_release=true" >> $GITHUB_OUTPUT
          else
            echo "git_tag=" >> $GITHUB_OUTPUT
            echo "is_release=false" >> $GITHUB_OUTPUT
          fi

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=tag
            type=raw,value=test-${{ github.ref_name }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VITE_GIT_COMMIT=${{ steps.git-info.outputs.commit_hash }}
            VITE_GIT_COMMIT_SHORT=${{ steps.git-info.outputs.commit_short }}
            VITE_GIT_TAG=${{ steps.git-info.outputs.git_tag }}
            VITE_GIT_IS_RELEASE=${{ steps.git-info.outputs.is_release }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Copy docker-compose.yml to Server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          source: "docker-compose.yml"
          target: "/opt/nikitaredko"

      - name: Deploy to Test Environment
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            echo ">>> Deploying test version ${{ github.ref_name }}..."
            echo ${{ secrets.GITHUB_TOKEN }} | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            
            cd /opt/nikitaredko
            cp /etc/nikitaredko-site/.env.test .env
            export IMAGE_NAME="ghcr.io/${{ github.repository }}:test-${{ github.ref_name }}"
            export CONTAINER_NAME="nikitaredko-site-test"
            export PORT="8081"
            docker compose -p nikitaredko-test pull
            docker compose -p nikitaredko-test up -d
            
            echo ">>> Test deployment completed"

      - name: Wait and Health Check Test Environment
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            echo ">>> Waiting for test environment to start..."
            sleep 10
            
            echo ">>> Running health check on test environment..."
            MAX_RETRIES=10
            RETRY_COUNT=0
            
            while [ $RETRY_COUNT -lt $MAX_RETRIES ]; do
              if curl -f -s http://localhost:8081/ > /dev/null 2>&1; then
                echo ">>> Health check PASSED"
                exit 0
              fi
              
              RETRY_COUNT=$((RETRY_COUNT + 1))
              echo ">>> Health check attempt $RETRY_COUNT/$MAX_RETRIES failed, retrying in 5 seconds..."
              sleep 5
            done
            
            echo ">>> Health check FAILED after $MAX_RETRIES attempts"
            exit 1

      - name: Cleanup Test Environment
        if: success()
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            echo ">>> Cleaning up test environment..."
            cd /opt/nikitaredko
            docker compose -p nikitaredko-test down
            docker rmi ghcr.io/${{ github.repository }}:test-${{ github.ref_name }} || true
            
            echo ">>> Test environment cleaned up"

      - name: Deploy to Production
        if: success()
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            echo ">>> Deploying to production ${{ github.ref_name }}..."
            echo ${{ secrets.GITHUB_TOKEN }} | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            
            cd /opt/nikitaredko
            cp /etc/nikitaredko-site/.env .env
            export IMAGE_NAME="ghcr.io/${{ github.repository }}:${{ github.ref_name }}"
            export CONTAINER_NAME="nikitaredko-site-prod"
            export PORT="8080"
            docker compose -p nikitaredko-prod pull
            docker compose -p nikitaredko-prod up -d
            docker image prune -f
            
            echo ">>> Production deployment completed successfully!"

      - name: Rollback on Failure
        if: failure()
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            echo ">>> Deployment failed! Rolling back test environment..."
            cd /opt/nikitaredko
            docker compose -p nikitaredko-test down || true
            echo ">>> Test environment rolled back"