services:
  app:
    image: ${IMAGE_NAME:-nikitaredko-site:local}
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ${CONTAINER_NAME:-nikitaredko-site}
    ports:
      - "${PORT:-8080}:8080"
    env_file:
      - ${ENV_FILE:-/etc/nikitaredko-site/.env}
    restart: unless-stopped